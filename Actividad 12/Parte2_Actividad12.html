<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Reconocimiento de Números</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    h2 { margin-bottom: 16px; }

    canvas {
      background: black;
      cursor: crosshair;
      border: 2px solid #333;
      border-radius: 8px;
      display: block;
    }

    .botones {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 24px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #btnPredecir { background: #e05c00; color: white; }
    #btnLimpiar  { background: #ccc; color: #333; }

    #resultado {
      margin-top: 24px;
      font-size: 28px;
      font-weight: bold;
      min-height: 40px;
    }
  </style>
</head>
<body>

  <h2>Dibuja un número</h2>
  <canvas id="canvas" width="280" height="280"></canvas>

  <div class="botones">
    <button id="btnPredecir">Predecir</button>
    <button id="btnLimpiar">Limpiar</button>
  </div>

  <div id="resultado">—</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let dibujando = false;

  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (canvas.width / rect.width),
      y: (e.clientY - rect.top)  * (canvas.height / rect.height)
    };
  }

  canvas.addEventListener('mousedown', e => {
    dibujando = true;
    ctx.beginPath();
    const p = getPos(e);
    ctx.moveTo(p.x, p.y);
  });

  canvas.addEventListener('mousemove', e => {
    if (!dibujando) return;
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });

  canvas.addEventListener('mouseup',    () => { dibujando = false; predecir(); });
  canvas.addEventListener('mouseleave', () => { dibujando = false; });

  document.getElementById('btnPredecir').addEventListener('click', predecir);

  document.getElementById('btnLimpiar').addEventListener('click', () => {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    document.getElementById('resultado').textContent = '—';
  });

  function getPixeles() {
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = 28;
    const tctx = tmp.getContext('2d');
    tctx.drawImage(canvas, 0, 0, 28, 28);

    const pixeles = [];
    for (let x = 0; x < 28; x++) {
      for (let y = 0; y < 28; y++) {
        const d = tctx.getImageData(y, x, 1, 1).data;
        let color = (d[0] + d[1] + d[2]) / (3 * 255);
        pixeles.push((Math.round(color * 100) / 100).toFixed(2));
      }
    }
    return pixeles;
  }

  function predecir() {
    const nombres = ['Cero','Uno','Dos','Tres','Cuatro','Cinco','Seis','Siete','Ocho','Nueve'];
    document.getElementById('resultado').textContent = 'Prediciendo...';

    $.post('http://localhost:8000', { pixeles: getPixeles().join(',') }, function(res) {
      const n = parseInt(res.trim());
      document.getElementById('resultado').textContent = n + ' — ' + nombres[n];
    }).fail(function() {
      document.getElementById('resultado').textContent = 'Error: ¿Está corriendo el servidor?';
    });
  }
</script>

</body>
</html>
